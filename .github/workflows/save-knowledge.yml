name: Slack ナレッジ登録

on:
  repository_dispatch:
    types: [slack-knowledge-submitted]

jobs:
  save-knowledge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Markdownファイルを生成してPRを作成
        env:
          TITLE: ${{ toJSON(github.event.client_payload.title) }}
          CATEGORY: ${{ toJSON(github.event.client_payload.category) }}
          BODY: ${{ toJSON(github.event.client_payload.body) }}
          AUTHOR: ${{ toJSON(github.event.client_payload.author) }}
          PHASE: ${{ toJSON(github.event.client_payload.phase) }}
          AI_MODEL: ${{ toJSON(github.event.client_payload.ai_model) }}
          TAGS: ${{ toJSON(github.event.client_payload.tags) }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os, re, subprocess, json
          from datetime import datetime, timezone, timedelta

          def get_val(key, default=''):
              val_str = os.environ.get(key, '')
              try:
                  val = json.loads(val_str)
                  if isinstance(val, list):
                      return ', '.join(str(x) for x in val)
                  if val is None:
                      return default
                  return str(val)
              except Exception:
                  return val_str or default

          title    = get_val('TITLE', 'knowledge')
          category = get_val('CATEGORY', '')
          body     = get_val('BODY', '')
          author   = get_val('AUTHOR', '')
          phase    = get_val('PHASE', '')
          ai_model = get_val('AI_MODEL', '')
          tags     = get_val('TAGS', '')

          JST = timezone(timedelta(hours=9))
          now = datetime.now(JST)
          date = now.strftime('%Y-%m-%d')
          time_str = now.strftime('%H%M%S')
          
          # ファイル名に使えない文字のみ除去し、日本語タイトルをそのまま反映
          safe_title = re.sub(r'[\\/:*?"<>|\n\r\t]', '', title.replace(' ', '-'))
          safe_title = safe_title.strip('-') if safe_title.strip('-') else 'knowledge'
          filename = f'knowledge/{date}-{time_str}-{safe_title}.md'

          # MarkdownのFrontmatter構築
          metadata = {
              "date": date,
              "title": title,
              "category": category,
              "phase": phase,
              "ai_model": ai_model,
              "tags": tags,
              "author": author
          }
          frontmatter_lines = [f"{k}: {json.dumps(v, ensure_ascii=False)}" for k, v in metadata.items()]
          frontmatter_yaml = "\n".join(frontmatter_lines)

          content = f"---\n{frontmatter_yaml}\n---\n\n# {title}\n\n{body}\n"

          os.makedirs('knowledge', exist_ok=True)
          with open(filename, 'w', encoding='utf-8') as f:
              f.write(content)

          # ブランチ名は確実に一意になるようにタイムスタンプを使用
          branch_name = f"knowledge_{date.replace('-', '')}{time_str}"
          # PRタイトルは省略された英数字のsafe_titleではなく、元のタイトルをそのまま使用
          pr_title = f"{title} の追加マージ依頼"

          def run_cmd(cmd):
              result = subprocess.run(cmd, capture_output=True, text=True)
              if result.stdout:
                  print(result.stdout)
              if result.returncode != 0:
                  print(f"::error::Command failed: {' '.join(cmd)}")
                  print(f"stderr: {result.stderr}")
                  result.check_returncode()
              return result

          run_cmd(['git', 'config', 'user.email', 'github-actions@github.com'])
          run_cmd(['git', 'config', 'user.name', 'GitHub Actions'])
          run_cmd(['git', 'checkout', '-b', branch_name])
          run_cmd(['git', 'add', filename])
          run_cmd(['git', 'commit', '-m', f'docs: ナレッジ追加「{title}」'])
          run_cmd(['git', 'push', '-u', 'origin', branch_name])
          run_cmd(['gh', 'pr', 'create', '--base', 'main', '--head', branch_name, '--title', pr_title, '--body', f'Slackからナレッジ「{title}」が登録されました。'])
          PYEOF