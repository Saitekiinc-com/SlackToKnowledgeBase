name: Slack ナレッジ登録

on:
  repository_dispatch:
    types: [slack-knowledge-submitted]

jobs:
  save-knowledge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Markdownファイルを生成してコミット
        env:
          TITLE: ${{ github.event.client_payload.title }}
          CATEGORY: ${{ github.event.client_payload.category }}
          BODY: ${{ github.event.client_payload.body }}
          AUTHOR: ${{ github.event.client_payload.author }}
        run: |
          python3 << 'PYEOF'
          import os, re, subprocess
          from datetime import datetime

          title    = os.environ.get('TITLE', 'knowledge')
          category = os.environ.get('CATEGORY', '')
          body     = os.environ.get('BODY', '')
          author   = os.environ.get('AUTHOR', '')

          now = datetime.now()
          date = now.strftime('%Y-%m-%d')
          time = now.strftime('%H%M%S')
          safe_title = re.sub(r'[^a-zA-Z0-9-]', '', title.replace(' ', '-')) or 'knowledge'
          filename = f'knowledge/{date}-{time}-{safe_title}.md'

          content = f'''---
          date: {date}
          title: "{title}"
          category: "{category}"
          author: {author}
          ---

          # {title}

          {body}
          '''
          # インデント除去
          import textwrap
          content = textwrap.dedent(content)

          os.makedirs('knowledge', exist_ok=True)
          with open(filename, 'w', encoding='utf-8') as f:
              f.write(content)

          subprocess.run(['git', 'config', 'user.email', 'github-actions@github.com'], check=True)
          subprocess.run(['git', 'config', 'user.name', 'GitHub Actions'], check=True)
          subprocess.run(['git', 'add', '.'], check=True)
          subprocess.run(['git', 'commit', '-m', f'docs: ナレッジ追加「{title}」'], check=True)
          subprocess.run(['git', 'push'], check=True)
          PYEOF
